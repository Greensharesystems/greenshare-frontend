name: Azure Static Web Apps Dev Preview

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: swa-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_dev_preview:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    name: Deploy Dev Preview
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Deploy Dev Preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_POND_0C214DB00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: ""
          output_location: ""
          skip_app_build: false
          deployment_environment: dev
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_STAGING }}
